name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Check, Test, Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --locked

      - name: cargo check (no default features)
        run: cargo check --locked --no-default-features

      - name: cargo test (unit tests only — no features)
        run: cargo test --locked --lib

      - name: cargo test (all features, incl. integration tests)
        run: cargo test --locked --all-features

      - name: cargo clippy (all features)
        run: cargo clippy --locked --all-features --all-targets -- -D warnings

      - name: cargo clippy (no default features)
        run: cargo clippy --locked --no-default-features --all-targets -- -D warnings

      - name: cargo doc (catches broken links)
        run: cargo doc --locked --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - uses: taiki-e/install-action@cargo-deny

      - name: cargo deny check licenses
        run: cargo deny check licenses
